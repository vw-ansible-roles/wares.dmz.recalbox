---
# vars file for recalbox

# general/network
recalbox_ssh_enabled: 1
recalbox_samba_enabled: 0
recalbox_audio_device: "alsa_card.1:hdmi-output-0"
recalbox_audio_mode: "videosoundonly" # deprecated since v9.2.3 : musicxorvideosound,musicandvideosound,musiconly,videosoundonly,none
recalbox_music_volume: 60 # new since v9.2.3
recalbox_audio_volume: 90
recalbox_audio_bgmusic: 0
recalbox_system_manager_enabled: 0
recalbox_sharewait: 30
recalbox_forcebasicgamelistview: 0

# screensaver
recalbox_es_screensaver_time: 5
recalbox_es_screensaver_type: "dim" # dim, black, demo, gameclip

# Virtual systems
recalbox_es_virtualarcade: 0
recalbox_es_collection_ports: 1
recalbox_es_collection_genre: ""
recalbox_es_collection_lastplayed: 1

# multiplayer
recalbox_global_netplay_enabled: 1
recalbox_global_netplay_port: 55435

# pc only
recalbox_kodi_enabled: 1
recalbox_kodi_at_startup: 0
